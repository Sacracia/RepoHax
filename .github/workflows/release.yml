name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (tag, branch, or commit SHA)'
        required: true
        type: string
      release_tag:
        description: 'Release tag name (e.g., v1.0.0). Will be created on the chosen ref if it does not exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Resolve build parameters
        id: params
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $buildRef   = '${{ inputs.ref }}'
            $releaseTag = '${{ inputs.release_tag }}'
          } else {
            $buildRef   = '${{ github.ref_name }}'
            $releaseTag = '${{ github.ref_name }}'
          }
          if (-not $releaseTag.StartsWith('v')) {
            Write-Error "Release tag must start with 'v', got '$releaseTag'"
            exit 1
          }
          "build_ref=$buildRef"     | Out-File -Append $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host "Build ref   : $buildRef"
          Write-Host "Release tag : $releaseTag"

      - name: Checkout build ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.params.outputs.build_ref }}
          fetch-depth: 0

      - name: Read versions
        id: ver
        shell: pwsh
        run: |
          $tag         = '${{ steps.params.outputs.release_tag }}'
          $haxVersion  = $tag.TrimStart('v')
          if (-not (Test-Path REPO_VERSION)) {
            Write-Error "REPO_VERSION file missing in ref '${{ steps.params.outputs.build_ref }}'"
            exit 1
          }
          $repoVersion = (Get-Content -Raw REPO_VERSION).Trim()
          if (-not $repoVersion) { Write-Error 'REPO_VERSION is empty'; exit 1 }

          "hax_version=$haxVersion"   | Out-File -Append $env:GITHUB_OUTPUT
          "repo_version=$repoVersion" | Out-File -Append $env:GITHUB_OUTPUT
          "release_name=RepoHax $tag for REPO v$repoVersion" | Out-File -Append $env:GITHUB_OUTPUT

          Write-Host "Hax version : $haxVersion"
          Write-Host "REPO version: $repoVersion"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x64
        run: msbuild RepoHax.sln /p:Configuration=Release /p:Platform=x64 /v:minimal /nologo

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item build/Release/bin/version.dll release/version.dll

      - name: Generate changelog
        id: changelog
        shell: pwsh
        run: |
          $current = '${{ steps.params.outputs.release_tag }}'
          $headSha = git rev-parse HEAD

          # Look for a previous v* tag, ignoring the current one if it exists
          $prev = git tag --sort=-creatordate --list 'v*' |
                  Where-Object { $_ -ne $current } |
                  Select-Object -First 1

          if ($prev) {
            $range  = "$prev..$headSha"
            $header = "**Changes since $prev**"
          } else {
            $range  = $headSha
            $header = '**Initial release**'
          }

          $log = git log $range --pretty=format:'- %s (%h)' --no-merges
          if (-not $log) { $log = '_no commit history available_' }

          $body = @"
          ## Built for REPO v${{ steps.ver.outputs.repo_version }}

          Drop ``version.dll`` next to the game executable to load the cheat.

          ## $header

          $log
          "@

          $body | Out-File -FilePath release_body.md -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RepoHax-${{ steps.params.outputs.release_tag }}
          path: release/version.dll
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.ver.outputs.release_name }}
          tag_name: ${{ steps.params.outputs.release_tag }}
          target_commitish: ${{ steps.params.outputs.build_ref }}
          body_path: release_body.md
          files: release/version.dll
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
